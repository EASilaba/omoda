<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de Sucursales - Buenos Aires</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5n/N0RDwH4=" crossorigin=""/>

  <style>
    :root {
      --bg-card: rgba(255, 255, 255, 0.96);
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-soft: #3b82f6;
      --primary-foreground: white;
      --foreground: #0f172a;
      --muted: #64748b;
      --accent: #f1f5f9;
    }

    * { box-sizing: border-box; }
    body, html { margin:0; padding:0; height:100%; font-family: system-ui, sans-serif; }

    #map { height: 100vh; width: 100%; }

    /* Sidebar desktop */
    .sidebar {
      position: absolute;
      inset: 1rem  auto 1rem 1rem;
      width: 340px;
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 30px -8px rgba(0,0,0,0.12);
      z-index: 1000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar h2 {
      margin: 0;
      padding: 1.25rem 1.25rem 0.75rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--foreground);
    }

    .branch-list {
      padding: 0.5rem 0.75rem 1.25rem;
      flex: 1;
      overflow-y: auto;
    }

    .branch-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 0.85rem 1rem;
      text-align: left;
      border: none;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .branch-btn.active,
    .branch-btn:active {
      background: var(--primary);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37,99,235,0.25);
    }

    .branch-btn.active .branch-subtitle,
    .branch-btn:hover:not(.active) .branch-subtitle {
      opacity: 0.9;
    }

    .branch-btn:not(.active):hover {
      background: var(--accent);
    }

    .branch-icon { flex-shrink: 0; width: 28px; height: 28px; }

    .branch-title {
      font-weight: 600;
      margin: 0;
      font-size: 1.05rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .branch-subtitle {
      margin: 0.25rem 0 0;
      font-size: 0.875rem;
      opacity: 0.75;
    }

    /* Mobile bottom sheet */
    .mobile-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 1100;
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -6px 25px rgba(0,0,0,0.18);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 75vh;
    }

    .mobile-sheet.collapsed {
      transform: translateY(calc(100% - 60px));
    }

    .mobile-handle {
      height: 5px;
      width: 40px;
      background: var(--muted);
      border-radius: 999px;
      margin: 12px auto;
      cursor: grab;
    }

    .mobile-header {
      text-align: center;
      font-weight: 600;
      color: var(--foreground);
      padding: 0.5rem 1rem 0.25rem;
      font-size: 1.1rem;
    }

    .mobile-content {
      padding: 0 1.25rem 1.5rem;
      max-height: calc(75vh - 70px);
      overflow-y: auto;
    }

    @media (min-width: 768px) {
      .sidebar { display: flex; }
      .mobile-sheet { display: none !important; }
    }

    @media (max-width: 767px) {
      .mobile-sheet { display: block; }
    }
  </style>
</head>
<body>

  <div id="map" aria-label="Mapa interactivo con las sucursales en el Área Metropolitana de Buenos Aires"></div>

  <!-- Sidebar desktop -->
  <aside class="sidebar" aria-labelledby="title-sucursales">
    <h2 id="title-sucursales">Sucursales</h2>
    <div class="branch-list" role="list">
      <!-- Las coordenadas son aproximadas – puedes ajustarlas -->
      <button class="branch-btn active" type="button" data-lat="-34.588" data-lng="-58.398" data-name="central">
        <svg class="branch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <div>
          <p class="branch-title">Sede Central</p>
          <p class="branch-subtitle">Av. Libertador 1234, CABA</p>
        </div>
      </button>

      <button class="branch-btn" type="button" data-lat="-34.523" data-lng="-58.468" data-name="norte">
        <svg class="branch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <div>
          <p class="branch-title">Sucursal Norte</p>
          <p class="branch-subtitle">San Martín 567, Vicente López</p>
        </div>
      </button>

      <button class="branch-btn" type="button" data-lat="-34.705" data-lng="-58.362" data-name="sur">
        <svg class="branch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <div>
          <p class="branch-title">Sucursal Sur</p>
          <p class="branch-subtitle">Av. Mitre 890, Avellaneda</p>
        </div>
      </button>

      <button class="branch-btn" type="button" data-lat="-34.634" data-lng="-58.792" data-name="oeste">
        <svg class="branch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <div>
          <p class="branch-title">Sucursal Oeste</p>
          <p class="branch-subtitle">Ruta 7 Km 32, Moreno</p>
        </div>
      </button>

      <button class="branch-btn" type="button" data-lat="-34.725" data-lng="-58.258" data-name="este">
        <svg class="branch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <div>
          <p class="branch-title">Sucursal Este</p>
          <p class="branch-subtitle">Colón 345, Quilmes</p>
        </div>
      </button>
    </div>
  </aside>

  <!-- Mobile bottom sheet -->
  <div class="mobile-sheet collapsed" id="mobileSheet">
    <div class="mobile-handle"></div>
    <div class="mobile-header">Sucursales</div>
    <div class="mobile-content">
      <div class="branch-list" role="list">
        <!-- Mismo contenido de botones que arriba – puedes copiar/pegar o usar JS para sincronizar -->
        <!-- Por brevedad se omite aquí, pero en producción deberías mantenerlos sincronizados -->
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script>
    // ────────────────────────────────────────────────
    // Configuración del mapa
    // ────────────────────────────────────────────────
    const map = L.map('map', {
      zoomControl: false,  // lo ponemos manualmente abajo a la derecha
      attributionControl: true
    }).setView([-34.6037, -58.3816], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    // Control de zoom en esquina inferior derecha
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // ────────────────────────────────────────────────
    // Marcadores reales
    // ────────────────────────────────────────────────
    const sucursales = [
      { name: "central", lat: -34.588, lng: -58.398, title: "Sede Central", address: "Av. Libertador 1234, CABA", color: "#dc2626" },
      { name: "norte",   lat: -34.523, lng: -58.468, title: "Sucursal Norte", address: "San Martín 567, Vicente López", color: "#2563eb" },
      { name: "sur",     lat: -34.705, lng: -58.362, title: "Sucursal Sur", address: "Av. Mitre 890, Avellaneda", color: "#16a34a" },
      { name: "oeste",   lat: -34.634, lng: -58.792, title: "Sucursal Oeste", address: "Ruta 7 Km 32, Moreno", color: "#d97706" },
      { name: "este",    lat: -34.725, lng: -58.258, title: "Sucursal Este", address: "Colón 345, Quilmes", color: "#7c3aed" }
    ];

    const markers = {};

    sucursales.forEach(s => {
      const icon = L.divIcon({
        className: "custom-marker",
        html: `<div style="background:${s.color};width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.3);"></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -20]
      });

      const marker = L.marker([s.lat, s.lng], { icon, alt: `${s.title} - ${s.address}` })
        .bindPopup(`<b>${s.title}</b><br>${s.address}`)
        .addTo(map);

      markers[s.name] = marker;
    });

    // ────────────────────────────────────────────────
    // Interacción: selección de sucursal → centrar mapa
    // ────────────────────────────────────────────────
    const allButtons = document.querySelectorAll('.branch-btn');

    function selectBranch(name) {
      // Quitar active de todos
      allButtons.forEach(btn => btn.classList.remove('active'));

      // Activar el seleccionado
      const btn = document.querySelector(`.branch-btn[data-name="${name}"]`);
      if (btn) btn.classList.add('active');

      // Centrar mapa + zoom
      const suc = sucursales.find(s => s.name === name);
      if (suc) {
        map.flyTo([suc.lat, suc.lng], 15, { duration: 1.2 });
        markers[name].openPopup();
      }
    }

    allButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.name;
        selectBranch(name);
      });
    });

    // Seleccionar central al inicio
    selectBranch('central');

    // ────────────────────────────────────────────────
    // Animación bottom-sheet (mobile)
    // ────────────────────────────────────────────────
    const sheet = document.getElementById('mobileSheet');
    let isExpanded = false;

    function toggleSheet() {
      isExpanded = !isExpanded;
      sheet.classList.toggle('collapsed', !isExpanded);
    }

    // Click en handle o header
    document.querySelector('.mobile-handle')?.addEventListener('click', toggleSheet);
    document.querySelector('.mobile-header')?.addEventListener('click', toggleSheet);

    // Swipe básico (opcional – mejora UX)
    let startY;
    sheet.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
    });

    sheet.addEventListener('touchend', e => {
      const diff = startY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && !isExpanded) toggleSheet();     // swipe up → expand
        if (diff < 0 && isExpanded) toggleSheet();      // swipe down → collapse
      }
    });
  </script>
</body>
</html>
